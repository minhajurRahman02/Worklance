<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/user-select.css">
    <link rel="icon" href="assets/images/Worklance_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Select User</title>
</head>

<body class="py-30">
    <div class="content w-4/5 mx-auto p-20">
        <nav class="pb-15">
            <img src="assets/images/worklance_title_logo.png" alt="">
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Contact</a></li>
            </ul>
        </nav>

        <section class="select-role">
            <div class="text-center pb-10">
                <p class="heading-font-3 pb-3"> <span style="color: #145DA0;">Select</span> your role</p>
                <p class="regular-font-4">Select your role to access the tools and features designed for your needs.</p>
            </div>
            <div class="role-container w-4/5 mx-auto pb-10 grid grid-cols-3 justify-items-center items-center gap-3">
                <div class="role">
                    <img src="assets/images/admin-role.png" alt="">
                    <p class="regular-font-2">Admin</p>
                </div>
                <div class="role">
                    <img class="rounded-2xl" src="assets/images/client-role.png" alt="">
                    <p class="regular-font-2">Client</p>
                </div>
                <div class="role">
                    <img src="assets/images/freelancer-role.png" alt="">
                    <p class="regular-font-2">Freelancer</p>
                </div>
            </div>
            <div class="text-center">
                <a class="regular-font-4 underline text-center" href="">Continue as Guest</a>
            </div>
        </section>
    </div>
</body>

</html>
